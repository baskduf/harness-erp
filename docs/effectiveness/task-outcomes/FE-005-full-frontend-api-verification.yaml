    - method: POST
      path: /purchase-requests/{purchaseRequestId}/reject
      required_role_or_header: "X-ERP-Role: MANAGER"
      ui_action: Approval Queue reject button with nonblank comment.
      result: covered; smoke verified EMPLOYEE-role denial, then rejected as MANAGER and saw persisted rejection history.
    - method: GET
      path: /purchase-requests/{purchaseRequestId}/approvals
      required_role_or_header: none
      ui_action: Approval History search by purchase request id.
      result: covered; smoke loaded approval and rejection history with approval id, request id, decision, comment, and creation time.
  notes: Browser smoke on `http://localhost:8080/` created an employee as ADMIN, listed employees, searched by name, selected the employee row, loaded detail, updated employee name and department as ADMIN, and verified EMPLOYEE-role update denial. It created one draft and two submitted purchase requests as EMPLOYEE, listed all requests, filtered by employee id, status, and combined filters, loaded purchase request detail, and verified ADMIN-role purchase create denial. It verified EMPLOYEE-role approve and reject denials, then approved and rejected submitted requests as MANAGER with nonblank comments and loaded persisted history for both requests. Status messages were visible, the layout overflow scan found no shell/toolbar/tab/button overflow at the tested viewport, and browser console errors were empty.

